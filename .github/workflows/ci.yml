name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: shellcheck
        run: shellcheck baize install.sh test/helpers/stubs/*
      - name: bats
        shell: bash
        run: bats test/
